[project]
name = "arcanum-sdk"
version = "0.0.0"
description = "Open, non-custodial governance SDK for autonomous AI money on Arc."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Arcanum Contributors" }]
dependencies = [
  "eth-account>=0.10,<0.14",
  "web3>=6,<7",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "pytest-asyncio>=0.23,<1",
  "ruff>=0.8,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arcanum_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
