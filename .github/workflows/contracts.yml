name: Contracts

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  foundry:
    # Local forge build/test is green. Keep the heavy Foundry job manual while
    # public CI dependency restore is stabilized, so push checks are not blocked
    # by ignored lib/out artifacts or transient registry/network behavior.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Restore Foundry dependencies
        run: |
          rm -rf lib
          mkdir -p lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable lib/openzeppelin-contracts-upgradeable
          git clone --depth 1 https://github.com/Vectorized/solady lib/solady
      - run: forge build
      - run: forge test

  analyzers:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Restore Foundry dependencies
        run: |
          rm -rf lib
          mkdir -p lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable lib/openzeppelin-contracts-upgradeable
          git clone --depth 1 https://github.com/Vectorized/solady lib/solady
      - run: pipx install slither-analyzer
      - run: slither . || true
      - run: pipx install mythril
      - run: myth analyze src/GuardedWallet.sol || true
