name: SDK

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test --workspace @arcanum/sdk
      - run: npm run build --workspace @arcanum/sdk
      - run: npm run size --workspace @arcanum/sdk

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
        working-directory: packages/sdk-py
      - run: uv run pytest
        working-directory: packages/sdk-py
      - run: uv build
        working-directory: packages/sdk-py
