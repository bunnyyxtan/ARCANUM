apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcanum-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcanum-web
  template:
    metadata:
      labels:
        app: arcanum-web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
          env:
            - name: ARCANUM_DEPLOYMENT_MODE
              value: "{{ .Values.env.ARCANUM_DEPLOYMENT_MODE }}"
            - name: ARCANUM_TELEMETRY
              value: "{{ .Values.env.ARCANUM_TELEMETRY }}"
